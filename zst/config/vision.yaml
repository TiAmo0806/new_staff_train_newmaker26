camera:
  exposure_us: 8000           #曝光时间8ms
  gain: 8                     #模拟增益
  auto_exposure: true
  frame_timeout_ms: 200       # 单次等帧超时；比原来的1000ms更快发现USB/相机异常
  reconnect_after_failures: 5 # 连续失败5次后自动关闭并重新打开相机

model:
  # 相对路径以 zst 项目根目录为基准，由 Utils 自动转换成绝对路径。
  onnx_path: "best5.onnx"              # OpenVINO直接加载此ONNX，不再使用ONNX Runtime
  device: "CPU"                       # AUTO自动选择Intel CPU/GPU/NPU；只用CPU可改为"CPU"
  cache_dir: "runtime/openvino_cache"  # 首次编译写缓存，后续启动直接复用以缩短载入时间
  input_width: 640                      # 必须与 ONNX 导出时的 imgsz/输入宽度一致
  input_height: 640                     # 必须与 ONNX 导出时的 imgsz/输入高度一致
  intra_op_threads: 0                   # 0=OpenVINO自动选择；也可试2/4比较实际效果
  confidence: 0.45                      # 类别置信度阈值：越高误检越少、漏检可能越多
  nms_iou: 0.20                         # 同类框 NMS IoU 阈值：越低去重越严格

serial:
  port: "/dev/ttyACM0"                 # STM32 CDC 常见为 ttyACM，USB转串口常见为 ttyUSB
  baudrate: 115200                      # 当前 C++ 实现固定为 115200-8-N-1
  simulated: false                      # 比赛模式接真实电控；无电控测试时改为true
  tx_log: true                          # 打印 A6...CRC 的完整十六进制发送帧
  rx_log: true                          # 打印 5A camera_state CRC 的电控接收帧

# 两个队伍使用不同 C 板、不同时间上场，但共用视觉程序和物理串口。
# team_a：直接识别3豆或识别前2豆并推测place3后发送0x10；再发送数字0x11。
# team_b：中心第1个豆子 -> 全部数字位置数组 -> 中心剩余新豆子；豆子顺序不固定。
workflow:
  team_mode: "team_a"                  # 只选择电脑内部流程，不作为字段发送给电控
  vote_frames_per_stage: 20            # 每个阶段累计多少帧后投票
  min_hits_per_stage: 6                # 仅B组中心单豆：类别至少命中多少帧才算稳定
  min_complete_bean_order_frames: 12   # A组三豆从左到右同一完整排列达到12/20帧就直接保存
  min_inferred_bean_order_frames: 15   # 否则前两豆从左到右同一排列达到15/20帧，推测place3
  min_consistent_order_frames: 15      # A/B数字4目标从右到左至少15/20帧一致才保存
                                        # 数字排列通过后，再用15减去前四位数字之和推断place5
  team_b_center_width_ratio: 0.40      # 仅B组：只接受画面横向中间40%的豆子，A组不受影响
  clear_progress_on_start: true        # 每次新开机清上场断点；看门狗同次开机重启会覆盖为false
  resume_progress: true                # 仍保存本场断点；只有把上一项临时改false时才允许启动恢复
  progress_file: "runtime/workflow_progress.txt" # 自动清理正式文件及可能残留的.tmp临时文件

runtime:
  # competition：比赛模式，启动后等待电控camera_state=1才打开相机。
  # debug：日常调试模式，程序启动后直接打开相机，并忽略电控camera_state开关命令。
  # 没接电控进行日常调试时，保持 serial.simulated: true，只打印发送帧而不访问硬件。
  mode: "competition"
  # 以下调试输出与competition/debug流程模式相互独立。
  # systemd开机后台运行时保持false；登录Ubuntu桌面后手动运行可临时改true。
  show_window: false
  # true会把当前帧按X排序后的结果周期性输出到终端/systemd日志。
  terminal_detection_log: true
  terminal_detection_interval_frames: 10
  log_dir: "logs"
  terminal_line_limit: 80

planner:
  # 规则：黄豆->1，绿豆->2，白芸豆->3，4/5 为空箱。
  min_stable_frames: 3       #数字目标连续检测
