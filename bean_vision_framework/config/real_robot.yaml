runtime:
  mode: "real_robot"

input:
  type: "image"
  source: "../data/src001_train_000003.png"
  camera_id: 0

camera:
  camera_id: 0
  width: 1280
  height: 720
  fps: 30
  exposure:
    auto: false
    time: 8000
  gain:
    auto: false
    value: 4
  white_balance:
    auto: false
  image:
    flip_horizontal: false
    flip_vertical: false
    rotate: 0

command:
  source: "serial"

scan:
  frames_per_scan: 5
  min_vote_count: 3
  min_avg_confidence: 0.6
  max_retry: 3
  stable_delay_ms: 100

detector:
  backend: "onnxruntime"
  model_path: "../bisai/bean_digit_v1_verified_20260624/best.onnx"
  conf_threshold: 0.25
  nms_threshold: 0.45
  class_file: "config/classes.yaml"

roi:
  # ROI presets:
  # - config/roi_current_backup.yaml  # backup of current roi.yaml, not a full-view assumption
  # - config/roi_single_view_4.yaml   # temporary single-view 4-ROI strategy with 4->5 inference
  # - config/roi_view_1.yaml          # three-view preset, manual debug only
  # - config/roi_view_2.yaml          # three-view preset, manual debug only
  # - config/roi_view_3.yaml          # three-view preset, manual debug only
  #
  # Note:
  # Real robot cannot see all 5 digits in one view.
  # Current code still requires L4~L8 keys to exist in every ROI file.
  # Three-view fusion is not implemented yet.
  file: "config/roi.yaml"

serial:
  mock: false
  port: "/dev/ttyACM0"
  baudrate: 115200
  ack_timeout_ms: 100
  max_resend: 3

debug:
  show_window: false
  draw_result: false
  print_detections: false
  print_roi_result: false
  print_vote_result: false
  print_state: false
  print_packet_hex: false
  print_tx_hex: false
  print_rx_hex: false
  print_parsed_packet: false
  save_raw_frame: false
  save_result_image: false
  output_dir: "debug_output"
