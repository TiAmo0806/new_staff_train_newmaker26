runtime:
  mode: "camera_yolo_preview"

input:
  type: "mindvision_camera"
  source: ""
  camera_id: 0

camera:
  camera_id: 0
  width: 1280
  height: 720
  fps: 30
  exposure:
    auto: false
    time: 14000
  gain:
    auto: false
    value: 1.0
  white_balance:
    auto: false
  image:
    flip_horizontal: false
    flip_vertical: false
    rotate: 0

roi:
  file: "config/roi_single_view_4.yaml"

detector:
  backend: "onnxruntime"
  model_path: "../bisai/bean_digit_v1_verified_20260624/best.onnx"
  conf_threshold: 0.25
  nms_threshold: 0.45
  class_file: "config/classes.yaml"

preview:
  draw_roi: true
  yolo_enable: true
  draw_boxes: true
  print_detections: true

debug:
  show_window: true
  draw_result: true
  save_raw_frame: false
  save_result_image: false
  show_mouse_position: true
  output_dir: "debug_output/camera_yolo_preview"
